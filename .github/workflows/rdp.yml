name: Windows Cloud PC

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: RDP Ayarlarını Yap ve Kullanıcı Oluştur
        run: |
          # RDP'yi aktifleştir
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

          # Güçlü şifre ile kullanıcı oluştur
          $Password = "RdpStrongPass2026!"
          $SecurePass = ConvertTo-SecureString $Password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $SecurePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          
          Write-Host "======================================"
          Write-Host "KULLANICI : RDP"
          Write-Host "ŞİFRE     : RdpStrongPass2026!"
          Write-Host "======================================"

      - name: Tailscale Kur ve Bağlan
        run: |
          # Tailscale'i kur
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet" -Wait
          
          # Tailscale ile bağlan
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=cloudpc-$env:GITHUB_RUN_ID
          
          Write-Host "Tailscale başarıyla bağlandı!"
          Write-Host "Tailscale uygulamasını açıp IP adresini not et."
